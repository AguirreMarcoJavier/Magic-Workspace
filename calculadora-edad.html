<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Edad Dinámica</title>
    
    <!-- core Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/magic-core.css">
    <script src="js/magic-shared.js"></script>
    <style>
        :root {
            --accent-color: var(--primary);
        }

        body {
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
        }

        

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s ease;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* Quitar las flechas del input number */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        button:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.23);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        #result {
            margin-top: 2rem;
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 3rem;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateY(10px);
        }

        #result.show {
            opacity: 1;
            transform: translateY(0);
        }

        .highlight {
            color: #60a5fa;
            font-weight: 800;
            font-size: 2.5rem;
            display: block;
            margin: 0.5rem 0;
        }
        
        

        
    </style>
</head>

<body>

    <div class="view-container md">
        <a href="index.html" class="nav-link">← Volver al Dashboard</a>
        <h1 class="gradient-heading">Calculadora de Edad</h1>
        <p>Ingresa tu año de nacimiento para descubrir cuántos años tienes o cumplirás este año.</p>

        <div class="input-group">
            <input type="number" id="birthYear" placeholder="Ej. 1990" min="1900" oninput="calculateAge()">
        </div>

        <div id="result" class="show"></div>
    </div>

    <script>
        function calculateAge() {
            const yearInput = document.getElementById('birthYear').value;
            const resultDiv = document.getElementById('result');
            const currentYear = new Date().getFullYear();

            // Escuchar silenciosamente hasta tener 4 digitos
            if(yearInput.length < 4) {
               resultDiv.innerHTML = "<span style='font-size: 0.9rem; font-weight: 400'>Escribe tu año...</span>";
               resultDiv.style.color = "var(--text-muted)";
               return;
            }

            const birthYear = parseInt(yearInput);

            if (birthYear > currentYear) {
                resultDiv.innerHTML = "Vaya, parece que vienes del futuro. 🚀";
                resultDiv.style.color = "#fbbf24";
            } else if (birthYear < 1900) {
                resultDiv.innerHTML = "Ingresa un año a partir de 1900.";
                resultDiv.style.color = "#ef4444";
            } else {
                const age = currentYear - birthYear;
                resultDiv.innerHTML = `Tienes <span class="highlight">${age}</span> años`;
                resultDiv.style.color = "";
            }
        }
    </script>
</body>

</html>
