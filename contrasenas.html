<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas Seguras</title>
    
    <!-- core Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/magic-core.css">
    <script src="js/magic-shared.js"></script>
    
    <style>
        :root {
            --accent-color: var(--primary);
        }

        body {
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .password-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem;
            border-radius: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.8rem;
            color: #10b981;
            margin-bottom: 1.5rem;
            word-break: break-all;
            min-height: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }
        body.light-mode .password-display { background: #f1f5f9; }

        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group label {
            color: var(--text-main);
            font-size: 1rem;
        }

        /* Toggle Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Range slider styling */
        input[type=range] {
            width: 100%;
            margin-top: 10px;
            accent-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(147, 51, 234, 0.39);
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .copy-btn {
            background-color: rgba(255,255,255,0.1);
            box-shadow: none;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            padding: 0.8rem;
        }
        .copy-btn:hover { background-color: rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <div class="view-container md">
        <a href="index.html" class="nav-link">← Volver al Dashboard</a>
        <h1 class="gradient-heading">Contraseñas Sec</h1>
        
        <div class="password-display" id="pwdDisplay">
            ******
        </div>
        
        <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">📋 Copiar al Portapapeles</button>
        
        <div style="margin-top: 2rem;">
            <div class="input-group" style="flex-direction: column; align-items: flex-start; gap: 0.5rem;">
                <label for="lengthSlider">Longitud: <span id="lengthValue">16</span></label>
                <input type="range" id="lengthSlider" min="8" max="32" value="16" oninput="updateLength(this.value); generatePassword()">
            </div>

            <div class="input-group">
                <label>Incluir Letras (A-Z, a-z)</label>
                <label class="switch"><input type="checkbox" id="chkLetters" checked onchange="generatePassword()"><span class="slider"></span></label>
            </div>
            
            <div class="input-group">
                <label>Incluir Números (0-9)</label>
                <label class="switch"><input type="checkbox" id="chkNumbers" checked onchange="generatePassword()"><span class="slider"></span></label>
            </div>
            
            <div class="input-group">
                <label>Incluir Símbolos (!@#$)</label>
                <label class="switch"><input type="checkbox" id="chkSymbols" checked onchange="generatePassword()"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <script>
        const letters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const numbers = "0123456789";
        const symbols = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        function updateLength(val) {
            document.getElementById('lengthValue').innerText = val;
        }

        function generatePassword() {
            const length = document.getElementById('lengthSlider').value;
            const useLetters = document.getElementById('chkLetters').checked;
            const useNumbers = document.getElementById('chkNumbers').checked;
            const useSymbols = document.getElementById('chkSymbols').checked;

            let charSet = "";
            if (useLetters) charSet += letters;
            if (useNumbers) charSet += numbers;
            if (useSymbols) charSet += symbols;

            if (charSet === "") {
                document.getElementById('pwdDisplay').innerText = "ERROR";
                alert("Debes seleccionar al menos un tipo de caracter");
                return;
            }

            let password = "";
            // Usamos Crypto para mayor seguridad verdadera
            const cryptoArray = new Uint32Array(length);
            window.crypto.getRandomValues(cryptoArray);

            for (let i = 0; i < length; i++) {
                password += charSet[cryptoArray[i] % charSet.length];
            }

            document.getElementById('pwdDisplay').innerText = password;
            document.getElementById('copyBtn').innerText = "📋 Copiar al Portapapeles";
        }

        function copyToClipboard() {
            const pwd = document.getElementById('pwdDisplay').innerText;
            if(pwd === "******" || pwd === "ERROR") return;
            navigator.clipboard.writeText(pwd).then(() => {
                document.getElementById('copyBtn').innerText = "✅ ¡Copiado!";
            });
        }

        // Initialize
        generatePassword();
    </script>
</body>
</html>
