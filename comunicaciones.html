<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicaciones - Backlog</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/magic-core.css">
    <script src="js/magic-shared.js"></script>
    
    <style>
        :root {
            --it-color: #3b82f6;
            --ventas-color: #10b981;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --panel-bg: rgba(0, 0, 0, 0.02);
            --panel-border: rgba(0, 0, 0, 0.1);
            --it-color: #2563eb;
            --ventas-color: #059669;
        }

        body {
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            justify-content: center;
            background: var(--panel-bg);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .role-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .role-btn.active.it {
            border-color: var(--it-color);
            background: rgba(59, 130, 246, 0.1);
            color: var(--it-color);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .role-btn.active.ventas {
            border-color: var(--ventas-color);
            background: rgba(16, 185, 129, 0.1);
            color: var(--ventas-color);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .role-btn:hover:not(.active) {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Chat/Backlog Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-radius: 24px;
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Mensaje (Card) */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            padding: 1rem 1.2rem;
            border-radius: 18px;
            position: relative;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.it {
            align-self: flex-start;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(59, 130, 246, 0.05));
            border-left: 4px solid var(--it-color);
            border-bottom-left-radius: 4px;
        }

        .message.ventas {
            align-self: flex-end;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
            border-right: 4px solid var(--ventas-color);
            border-bottom-right-radius: 4px;
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .msg-sender {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .it .msg-sender { color: var(--it-color); }
        .ventas .msg-sender { color: var(--ventas-color); }

        .msg-time { opacity: 0.7; }

        .msg-body {
            font-size: 1.05rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.8rem;
            gap: 0.5rem;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .status-badge.pendiente {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .status-badge.pendiente:hover {
            background: rgba(245, 158, 11, 0.3);
            transform: scale(1.05);
        }

        .status-badge.resuelto {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .message.resolved {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        /* Input Area */
        .chat-input-area {
            padding: 1.2rem;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--panel-border);
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        body.light-mode .chat-input-area {
            background: rgba(255, 255, 255, 0.5);
        }

        .input-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            padding: 1rem 1.2rem;
            border-radius: 16px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            transition: all 0.3s;
            height: 24px;
            line-height: 24px;
        }

        .input-box:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .send-btn {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: white;
            border: none;
            border-radius: 16px;
            width: 56px;
            height: 56px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .send-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.6);
        }
        .send-btn:active {
            transform: scale(0.95);
        }
        .send-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-left: 4px;
        }

        /* Scrollbar custom for chat */
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
        }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div class="view-container lg">
        
        <div class="role-selector">
            <div class="role-btn it" id="btnRoleIt" onclick="setRole('IT')">💻 Departamento IT</div>
            <div class="role-btn ventas" id="btnRoleVentas" onclick="setRole('Ventas')">💼 Departamento Ventas</div>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatArea">
                <!-- Messages will be injected here -->
            </div>
            
            <div class="chat-input-area">
                <textarea class="input-box" id="msgInput" placeholder="Escribe un mensaje o requerimiento..." onkeydown="handleEnter(event)"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        const STORAGE_KEY = 'comunicaciones_mensajes';
        let currentRole = localStorage.getItem('magic_comms_role') || 'IT';
        let messages = [];

        // Inicialización
        function init() {
            setRole(currentRole);
            loadMessages();
            scrollToBottom();
            
            // Escuchar cambios desde otros dispositivos
            window.addEventListener('magic:data-changed', (e) => {
                if (e.detail.key === STORAGE_KEY) {
                    messages = e.detail.data || [];
                    renderMessages();
                }
            });

            // Focus on input
            document.getElementById('msgInput').focus();

            // Interceptar datos en tiempo real de la LAN
            setInterval(pollServer, 1500);
        }

        let isPolling = false;
        function pollServer() {
            if (isPolling) return;
            isPolling = true;
            fetch('/api/sync')
                .then(r => r.json())
                .then(data => {
                    const serverMessages = data['magic_' + STORAGE_KEY];
                    if (serverMessages && Array.isArray(serverMessages)) {
                        if (JSON.stringify(messages) !== JSON.stringify(serverMessages)) {
                            messages = serverMessages;
                            // Actualizar localStorage para que MagicShared se entere
                            localStorage.setItem('magic_' + STORAGE_KEY, JSON.stringify(messages));
                            renderMessages();
                        }
                    }
                })
                .catch(e => {})
                .finally(() => { isPolling = false; });
        }

        // Selección de Rol
        function setRole(role) {
            currentRole = role;
            localStorage.setItem('magic_comms_role', role);
            
            document.getElementById('btnRoleIt').classList.toggle('active', role === 'IT');
            document.getElementById('btnRoleVentas').classList.toggle('active', role === 'Ventas');
        }

        // Cargar y Renderizar
        function loadMessages() {
            messages = MagicShared.load(STORAGE_KEY, []);
            renderMessages();
        }

        function renderMessages() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';

            if(messages.length === 0) {
                chatArea.innerHTML = `<div style="text-align:center; color: var(--text-muted); margin-top: 2rem;">No hay mensajes en el backlog. ¡Escribe algo para empezar!</div>`;
                return;
            }

            messages.forEach(msg => {
                const el = document.createElement('div');
                const roleClass = msg.sender.toLowerCase();
                const isResolved = msg.status === 'Resuelto';
                
                el.className = `message ${roleClass} ${isResolved ? 'resolved' : ''}`;
                
                const timeStr = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                let btnStatus = '';
                if(isResolved) {
                    btnStatus = `<div class="status-badge resuelto">✅ Resuelto</div>`;
                } else {
                    // Solo puedes resolver si eres de otra área? O cualquiera puede?
                    // Dejaremos que cualquiera pueda resolver, pero con un clic.
                    btnStatus = `<div class="status-badge pendiente" onclick="toggleStatus('${msg.id}')">⏳ Pendiente</div>`;
                }

                el.innerHTML = `
                    <div class="msg-header">
                        <span class="msg-sender">${msg.sender}</span>
                        <span class="msg-time">${timeStr}</span>
                    </div>
                    <div class="msg-body">${escapeHTML(msg.text)}</div>
                    <div class="msg-footer">
                        ${btnStatus}
                    </div>
                `;
                chatArea.appendChild(el);
            });
            scrollToBottom();
        }

        // Enviar Mensaje
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            const newMsg = {
                id: 'msg_' + Date.now() + '_' + Math.floor(Math.random()*1000),
                sender: currentRole,
                text: text,
                timestamp: new Date().toISOString(),
                status: 'Pendiente'
            };

            messages.push(newMsg);
            MagicShared.save(STORAGE_KEY, messages);
            
            input.value = '';
            input.style.height = '24px';
            renderMessages();
            input.focus();
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Cambiar estado a Resuelto
        function toggleStatus(id) {
            const index = messages.findIndex(m => m.id === id);
            if (index !== -1) {
                messages[index].status = messages[index].status === 'Pendiente' ? 'Resuelto' : 'Pendiente';
                MagicShared.save(STORAGE_KEY, messages);
                renderMessages();
            }
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chatArea');
            setTimeout(() => {
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 50);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            ).replace(/\n/g, '<br>');
        }

        // Evento auto-resize textbox
        document.getElementById('msgInput').addEventListener('input', function() {
            this.style.height = '24px';
            this.style.height = (this.scrollHeight - 32) + 'px'; // 32 is padding
        });

        // Iniciar
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
